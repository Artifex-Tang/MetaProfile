# ─────────────────────────────────────────────────────────────────────────────
# dev 覆盖:bind-mount 源码 + reload,改码/HTML 不重打镜像。
# docker compose up 自动合并此文件(base docker-compose.yml 保持 prod 不动)。
#
# 后端(Python 业界通用做法 = deps 烘焙镜像 + 挂源码 + reload):
#   - ..:/app 挂整个 repo 覆盖镜像内 /app(deps 在 /usr/local/lib/site-packages 不受影响)
#   - uvicorn --reload(--reload 与 workers 冲突,dev 单进程)
# 前端(dist 挂载,prod 同构 nginx):
#   - ../frontend/dist:/usr/share/nginx/html 挂主机构建产物
#   - 改 src 后主机 `npm run build`(或 `npm run build -- --watch`)重生成 dist,nginx 秒级伺新文件
#
# deps 变更(pyproject.toml / package.json)才需重打镜像:
#   docker compose build backend frontend
# ─────────────────────────────────────────────────────────────────────────────

services:

  backend:
    volumes:
      - ..:/app
    command: uvicorn metaprofile.backend.main:app --host 0.0.0.0 --port 8000 --reload

  migrate:
    volumes:
      - ..:/app

  seed:
    volumes:
      - ..:/app

  backend-worker:
    volumes:
      - ..:/app
    # celery 无原生 reload;改 worker 代码后:`docker compose restart backend-worker`

  frontend:
    volumes:
      - ../frontend/dist:/usr/share/nginx/html
    # 前提:主机已 `cd frontend && npm run build` 生成 dist
