name: metaprofile

# ─────────────────────────────────────────────────────────────────────────────
# 三层部署：基础设施（不变） + 单一后端镜像（全部后端功能） + 单一前端镜像。
# 自建镜像仅 2 个：metaprofile-backend（含 migrate/seed 复用）、metaprofile-frontend。
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── 基础设施层（不变） ─────────────────────────────────────────────────────

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: metaprofile
      POSTGRES_USER: metaprofile
      POSTGRES_PASSWORD: metaprofile
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./pg_init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metaprofile -d metaprofile"]
      interval: 5s
      timeout: 5s
      retries: 12

  elasticsearch:
    image: elasticsearch:8.11.3
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports: ["9200:9200"]
    volumes: [esdata:/usr/share/elasticsearch/data]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 60s

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 8

  neo4j:
    # 仅启用 apoc（本地 jar，无需联网下载）；graph-data-science 需联网，已移除
    image: neo4j:5.16
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    ports: ["7474:7474", "7687:7687"]
    volumes: [neo4jdata:/data]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  rabbitmq:
    image: rabbitmq:3.12-management
    ports: ["5672:5672", "15672:15672"]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    command: ["--config", "/app/litellm.yaml", "--port", "4000"]
    ports: ["4000:4000"]
    volumes: ["./litellm.yaml:/app/litellm.yaml:ro"]
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\""]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # ── Doris（ODS 源数据镜像 · opt-in） ──────────────────────────────────────
  # 单存档集群 1 FE + 1 BE。不随 `docker compose up` 启动（重 + 需手动初始化）：
  #   docker compose --profile doris up -d doris-fe doris-be
  # 搭建/加 BE/DDL/数据同步见 docs/ops/local-doris-setup-manual.md
  # 数据卷绑 H 盘（C 盘仅 29G；Doris 占盘大）。env 注入配置，无 conf 挂载。

  doris-fe:
    image: apache/doris:fe-2.1.11
    container_name: mp-doris-fe
    hostname: doris-fe
    profiles: ["doris"]
    environment:
      FE_SERVERS: "fe1:172.28.80.10:9010"
      FE_ID: "1"
      PRIORITY_NETWORKS: "172.28.80.0/24"
    ports:
      - "127.0.0.1:8030:8030"   # FE Web UI
      - "127.0.0.1:9030:9030"   # MySQL 协议（提取器/客户端连此）
    volumes:
      - H:/docker/doris/fe/doris-meta:/opt/apache-doris/fe/doris-meta
      - H:/docker/doris/fe/log:/opt/apache-doris/fe/log
    networks:
      dorisnet:
        ipv4_address: 172.28.80.10
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8030 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  doris-be:
    image: apache/doris:be-2.1.11
    container_name: mp-doris-be
    hostname: doris-be
    profiles: ["doris"]
    environment:
      PRIORITY_NETWORKS: "172.28.80.0/24"
      FE_SERVERS: "fe1:172.28.80.10:9010"
      BE_ADDR: "172.28.80.20:9050"
    mem_limit: 8g
    ports:
      - "127.0.0.1:8040:8040"   # BE Web UI
    volumes:
      - H:/docker/doris/be/storage:/opt/apache-doris/be/storage
      - H:/docker/doris/be/log:/opt/apache-doris/be/log
    networks:
      dorisnet:
        ipv4_address: 172.28.80.20
    restart: unless-stopped
    depends_on:
      - doris-fe

  # ── 数据库迁移（一次性 job，复用后端镜像） ─────────────────────────────────

  migrate:
    build:
      context: ..
      dockerfile: Dockerfile
    command: python -m alembic upgrade head
    env_file: [.env]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── 种子数据（一次性 job：100×4 实体 + 关系图谱，幂等可重跑） ──────────────

  seed:
    build:
      context: ..
      dockerfile: Dockerfile
    command: python scripts/gen_mock_data.py --no-es --count 100
    env_file: [.env]
    depends_on:
      migrate:
        condition: service_completed_successfully
      neo4j:
        condition: service_healthy
    restart: "no"

  # ── 后端（单一镜像，承载全部后端功能） ─────────────────────────────────────

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    command: uvicorn metaprofile.backend.main:app --host 0.0.0.0 --port 8000 --workers 2
    ports: ["8000:8000"]
    environment:
      PORT: "8000"
      # 分析层回调画像层 → 指向自身（同一复合后端）
      PROFILE_API_TECH_BASE_URL: "http://backend:8000"
      PROFILE_API_PROJECT_BASE_URL: "http://backend:8000"
      PROFILE_API_ORG_BASE_URL: "http://backend:8000"
      PROFILE_API_PERSON_BASE_URL: "http://backend:8000"
    env_file: [.env]
    depends_on:
      migrate:
        condition: service_completed_successfully
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 8

  # ── 前端（单一镜像，nginx 反代到 backend） ─────────────────────────────────

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports: ["80:80"]
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/index.html || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  pgdata:
  esdata:
  neo4jdata:

networks:
  dorisnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.80.0/24
